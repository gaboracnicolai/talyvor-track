server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve the asset if it exists, otherwise fall through
    # to index.html so client-side routing handles the path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset bundles never change once shipped — long cache + immutable
    # is safe and dramatically improves repeat-load latency.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health surface so the compose healthcheck has a tiny endpoint to hit.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
