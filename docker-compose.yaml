services:
  track:
    build: .
    ports:
      - "3000:3000"
    environment:
      - TRACK_DATABASE_URL=postgres://track:${POSTGRES_PASSWORD:-changeme}@postgres:5432/talyvor_track?sslmode=disable
      - TRACK_REDIS_URL=redis://redis:6379
      - TRACK_LENS_URL=${TRACK_LENS_URL:-http://localhost:8080}
      - TRACK_LENS_API_KEY=${TRACK_LENS_API_KEY:-}
      - TRACK_LENS_WEBHOOK_SECRET=${TRACK_LENS_WEBHOOK_SECRET:-}
      - TRACK_GITHUB_WEBHOOK_SECRET=${TRACK_GITHUB_WEBHOOK_SECRET:-}
      - TRACK_LOG_LEVEL=${TRACK_LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - track
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: talyvor_track
      POSTGRES_USER: track
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U track -d talyvor_track"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot schema migrator: applies all migrations via the canonical
  # `track migrate up` runner (embedded migrations) before the app starts — the SAME
  # path production uses. Replaces the old init-time schema mount so dev and prod share
  # one schema authority. Exits 0 when up to date; `track` waits on its completion.
  migrate:
    build: .
    command: ["migrate", "up"]
    environment:
      - TRACK_DATABASE_URL=postgres://track:${POSTGRES_PASSWORD:-changeme}@postgres:5432/talyvor_track?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
