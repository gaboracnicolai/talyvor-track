rules:
  - id: operate-by-id-write-requires-workspace-scope
    languages: [go]
    severity: ERROR
    message: >-
      SEC-5: this store performs a by-id DELETE/UPDATE (WHERE id = $n) with NO workspace_id
      predicate — the operate-by-id cross-tenant IDOR class. A caller authorized for workspace
      A can act on another workspace's object by passing its id. Add "AND workspace_id = $n",
      take the workspace from the authz-authorized context (authz.WorkspaceID — never the URL
      or body), and return a not-found sentinel on 0 rows so a foreign id 404s. Reference:
      project.Store.Delete / cycle.Store.Update (WHERE id=$1 AND workspace_id=$n).
    patterns:
      # A pgx Exec/QueryRow whose SQL LITERAL is a by-id DELETE or UPDATE ... WHERE id = $n.
      # NOTE: metavariable-regex is re.match-anchored and the value includes the leading
      # backtick/quote, so the pattern must start with (?s).* to search the whole literal.
      - pattern-either:
          - pattern: $Q.Exec($CTX, $SQL, ...)
          - pattern: $Q.QueryRow($CTX, $SQL, ...)
      - metavariable-regex:
          metavariable: $SQL
          regex: (?s).*(DELETE\s+FROM\s+\w+|UPDATE\s+\w+\s+SET).*\bWHERE\s+id\s*=\s*\$
      # Excluded when the SAME statement is already workspace-scoped (…AND workspace_id = $n):
      # the by-id op provably acts within one workspace and is safe.
      - pattern-not:
          patterns:
            - pattern-either:
                - pattern: $Q.Exec($CTX, $SQL, ...)
                - pattern: $Q.QueryRow($CTX, $SQL, ...)
            - metavariable-regex:
                metavariable: $SQL
                regex: (?s).*workspace_id
    paths:
      # SEC-5. Empty exclude for THIS rule — but note its scope: it matches only INLINE STRING LITERAL
      # SQL (the $SQL metavariable binds a literal). It was BLIND to `sql := fmt.Sprintf(...); Exec(ctx,
      # sql, ...)` — exactly how issue BulkUpdate's unscoped by-id write slipped past the "machine-proof"
      # claim. The companion rule operate-by-id-write-requires-workspace-scope-sprintf (below) now covers
      # the Sprintf-constructed case. So the "machine-proof over the whole by-id surface" claim holds only
      # WITH both rules. Groups 1-4 scoped every user-facing by-id DELETE/UPDATE (AND workspace_id / join).
      #
      # The only remaining suppressions are three INLINE `nosemgrep` lines, each with a written
      # justification at the code, for by-id writes that are genuinely NOT workspace-membership
      # scoped (a reviewer sees the reason in context, not hidden in a path glob):
      #   - workspace/store.go Delete   — self-scoping: id IS the authorized workspace (tenant root)
      #   - guest/store.go invite-accept — token-scoped: id resolved from a secret bearer token
      #   - featureboard/store.go vote×2 — public board: assertPostOnPublicBoard-guarded, email-identified
      exclude: []

  - id: operate-by-id-write-requires-workspace-scope-sprintf
    languages: [go]
    severity: ERROR
    message: >-
      SEC-5 (Sprintf variant): a by-id DELETE/UPDATE whose SQL is built with fmt.Sprintf has NO
      workspace_id in its FORMAT literal — the same operate-by-id cross-tenant IDOR class, but constructed
      dynamically so the inline-literal rule above is BLIND to it (the $SQL metavariable binds the variable
      name, not the format string). This is exactly how issue BulkUpdate slipped past the "empty exclude =
      machine-proof" claim. Add "AND workspace_id = $n" to the format string and thread authz.WorkspaceID.
    patterns:
      - pattern: fmt.Sprintf($FMT, ...)
      - metavariable-regex:
          metavariable: $FMT
          regex: (?s).*(DELETE\s+FROM\s+\w+|UPDATE\s+\w+\s+SET).*\bWHERE\s+id\s*=\s*\$
      - pattern-not:
          patterns:
            - pattern: fmt.Sprintf($FMT, ...)
            - metavariable-regex:
                metavariable: $FMT
                regex: (?s).*workspace_id
    paths:
      # Suppressed INLINE (nosemgrep + written reason) at the by-other-means-safe Sprintf sites — NOT a
      # path glob — so a reviewer sees the justification in context:
      #   - workspace/store.go Update — self-scoping: id IS the authorized workspace (tenant root); no
      #     separate workspace_id column applies (mirrors the existing Delete nosemgrep in this file).
      exclude: []
