name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Regression lock for the object-graph cross-object tenancy class: fails the build
  # when a store inserts a cross-object *_id reference alongside workspace_id without
  # routing it through tenancy.AssertRefInWorkspace. See .semgrep/cross-object-tenancy.yml
  # and internal/tenancy/closure_test.go.
  tenancy-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Object-graph cross-object tenancy regression lock
        run: |
          python -m pip install --quiet semgrep
          semgrep scan --config .semgrep/ --error --metrics=off internal/

  # Formal static-analysis gate (T3): golangci-lint (errcheck, govet, ineffassign,
  # staticcheck, unused). Config in .golangci.yml. Blocking — a finding fails the build.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  test:
    runs-on: ubuntu-latest
    services:
      # pgvector image because migration 0007 needs the `vector` extension
      # (plain postgres lacks it); uuid-ossp + pg_trgm ship with it too.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: track
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Admin DSN for the real-Postgres migrate tests; each creates + drops its
      # own isolated database (extensions are database-scoped, so per-DB not
      # per-schema). Other packages use pgxmock and ignore this.
      TRACK_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go vet
        run: go vet ./...
      # Prove the runner applies the real schema cleanly against real Postgres.
      - name: track migrate up (real Postgres)
        run: go run ./cmd/track migrate up
        env:
          TRACK_DATABASE_URL: postgres://postgres:postgres@localhost:5432/track?sslmode=disable
      - name: track migrate status
        run: go run ./cmd/track migrate status
        env:
          TRACK_DATABASE_URL: postgres://postgres:postgres@localhost:5432/track?sslmode=disable
      - name: go test
        run: go test -timeout 120s -race -count=1 ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Typecheck
        run: cd frontend && npm run typecheck
      - name: Build
        run: cd frontend && npm run build

  build-image:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/talyvor-track:latest
            ghcr.io/${{ github.repository_owner }}/talyvor-track:${{ github.sha }}
